<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Lost in Space</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#020024,#090979,#000000);
    color:white;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.container{
    max-width:500px;
}

h1{
    font-size:120px;
    margin:0;
}

h2{
    margin-top:0;
    font-weight:400;
}

p{
    opacity:0.8;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:25px;
    background:#00d9ff;
    color:black;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.astronaut{
    font-size:60px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0)}
    50%{transform:translateY(-15px)}
    100%{transform:translateY(0)}
}

</style>
</head>

<body>

<div class="container">

<div class="astronaut">👨‍🚀</div>

<h1>404</h1>

<h2>You are lost in space</h2>

<p>The page you are looking for doesn’t exist or has been moved.</p>

<button onclick="window.location.href='/'">
Go Back Home
</button>

</div>

</body>
</html>
